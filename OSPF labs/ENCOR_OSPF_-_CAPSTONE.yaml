      \tno shut\nint 1/0\n\tip address 10.110.1.2 255.255.255.0\n\tip ospf network\
      \ point-to-point\n\tno shut\nrouter ospf 1\n\trouter-id 192.168.1.2\n\tpassive-interface\
      \ default\n\tno passive-interface e0/0\n\tno passive-interface e0/1\n\tno passive-interface\
      \ e0/2\n\tno passive-interface e0/3\n\tno passive-interface e1/0\n\tnetwork\
      \ 1.1.1.1 0.0.0.0 area 0\n\tnetwork 10.10.0.0 0.0.255.255 area 45\n\tnetwork\
      \ 10.110.0.0 0.0.255.255 area 45\n\tend\nwr mem"
