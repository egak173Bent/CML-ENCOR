       area 45 range 10.10.0.0 255.255.0.0

      Ideal OSPF IP addressing scheme to help optimize
      LSA efficiency and HW load. Once IP addressing is
      designed, implement inter-area summarization.

      Example:
      10.10.1.0/24
      10.10.2.0/24
      10.10.3.0/24
      ...
      10.10.15.0/24
