    color: '#131313'
    rotation: 0
    text_bold: true
    text_content: |-
      All directly connected OSPF routers create Type 1 LSAs.
      ABRs create type 3 LSAs.
      Three fundamental rules for creating type 3 LSAs:
    text_font: monospace
    text_italic: false
    text_size: 12
    text_unit: pt
    thickness: 1
    type: text
    x1: 691.2837897442688
    y1: -314.41308819887706
    z_index: 9
  - border_color: '#00000000'
    border_style: ''
    color: '#E68F0E'
    rotation: 0
    text_bold: true
    text_content: |-
      Rule #1: If type 1 LSA received, then...
        1. create type 3 LSA (referencing type 1 LSA)
        2. send new type 3 LSA into backbone & non-backbone areas.
    text_font: monospace
    text_italic: false
    text_size: 12
    text_unit: pt
    thickness: 1
    type: text
    x1: 699.2459331553388
    y1: -236.40362405164473
    z_index: 9
  - border_color: '#00000000'
    border_style: ''
    color: '#0CB120'
    rotation: 0
    text_bold: true
    text_content: |-
      Rule #2: If type 3 LSA received from backbone/ area 0, then...
        1. regenerate another type 3 LSA
        2. send new type 3 LSA into non-backbone areas ONLY.
    text_font: monospace
    text_italic: false
    text_size: 12
    text_unit: pt
    thickness: 1
    type: text
    x1: 691.2837897442688
    y1: -154.4130881988774
    z_index: 9
  - border_color: '#EE06EE00'
    border_style: ''
    color: '#EE06EE'
    rotation: 0
    text_bold: true
    text_content: |-
      Rule #3: If type 3 LSA received from non-backbone area, then...
        1. only insert type 3 LSA into LSDB for the source area
        2. do not create type 3 LSAs for any additional areas
    text_font: monospace
    text_italic: false
    text_size: 12
    text_unit: pt
    thickness: 1
    type: text
