      \t\tipv6 address 2001:7DB8:1111:A::1/64\n\t\tip address 192.168.110.1 255.255.255.0\n\
      \t\tospfv3 1 ipv6 area 12\n\t\tospfv3 1 ipv4 area 12\n\t\tospfv3 network broadcast\n\
      \t\tno shut\n\tint e0/2\n\t\tipv6 address 2001:7DB8:1111:B::1/64\n\t\tip address\
      \ 192.168.111.1 255.255.255.0\n\t\tospfv3 1 ipv6 area 12\n\t\tospfv3 1 ipv4\
      \ area 12\n\t\tospfv3 network broadcast\n\t\tno shut\n\tint e0/3\n\t\tipv6 address\
